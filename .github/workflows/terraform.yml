name: Infrastructure (Terraform)

# Run on PRs to preview infra changes, apply on merge to main/develop
on:
  push:
    branches: [ main, develop ]
    paths:    [ 'terraform/**' ]
  pull_request:
    branches: [ main, develop ]
    paths:    [ 'terraform/**' ]
  workflow_dispatch:

env:
  AWS_REGION:  'ap-southeast-1'
  TF_VERSION:  '1.7.0'

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest
    environment: production                                                            # was: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }} — single cluster flightplan-prod

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Terraform state bucket if missing
        run: |
          aws s3api head-bucket --bucket flight-plan-tfstate 2>/dev/null || \
          aws s3api create-bucket \
            --bucket flight-plan-tfstate \
            --region ap-southeast-1 \
            --create-bucket-configuration LocationConstraint=ap-southeast-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="app_image_tag=latest" \
            -out=tfplan
          # was: -var="environment=${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}" — removed; environment now fixed to prod in variables
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: github.event_name == 'push' && steps.plan.outcome == 'success'
        run: terraform apply -auto-approve tfplan
