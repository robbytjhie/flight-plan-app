# SonarCloud project configuration
# Place this file at the repo root (alongside pom.xml)
# Values here are overridden by -D flags in the mvn sonar:sonar command in CI

sonar.projectKey=your-org_flight-plan-backend
sonar.organization=your-org
sonar.projectName=flight-plan-backend
sonar.projectVersion=1.0.0

# Source
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=17
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.java.libraries=target/dependency/*.jar

# Coverage — JaCoCo XML report generated by mvn jacoco:report
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8

# ── Quality Gate thresholds ────────────────────────────────────────────────
# These are enforced in the SonarCloud UI Quality Gate settings.
# The values below are documentation; the gate itself is configured on
# the SonarCloud project page under "Quality Gates".
#
#   Coverage on new code          ≥ 90%
#   Coverage overall              ≥ 90%
#   Duplicated lines on new code  ≤  3%
#   Maintainability rating         A
#   Reliability rating             A
#   Security rating                A
#   Security hotspots reviewed   100%
#   Blocker issues                  0
#   Critical issues                 0

# Exclusions — generated code, config classes, and the main entry point
sonar.exclusions=\
  **/FlightPlanApplication.java,\
  **/model/**,\
  **/config/OpenApiConfig.java,\
  **/config/AppConfig.java

sonar.coverage.exclusions=\
  **/FlightPlanApplication.java,\
  **/model/**,\
  **/config/OpenApiConfig.java,\
  **/config/AppConfig.java
