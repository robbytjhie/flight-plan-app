# IM8 IMPORTANT: This file is a TEMPLATE only.
# It must NEVER contain real credentials.
#
# Recommended provisioning approach (choose one):
#   1. kubectl create secret generic flightplan-secrets \
#        --from-literal=FLIGHT_API_KEY=<real-key> \
#        --from-literal=FLIGHT_API_BASE_URL=<real-url> \
#        --from-literal=REDIS_PASSWORD=<strong-password> \
#        --from-literal=CORS_ALLOWED_ORIGINS=https://<your-domain> \
#        -n flightplan
#
#   2. Use an external secrets operator (e.g. External Secrets Operator
#      with AWS Secrets Manager / HashiCorp Vault) — recommended for prod.
#
# The CI/CD pipeline should NOT apply this file (it contains only
# placeholders). Secrets must be pre-provisioned in the cluster.
apiVersion: v1
kind: Secret
metadata:
  name: flightplan-secrets
  namespace: flightplan
  annotations:
    # IM8: document that real values must be injected out-of-band
    security.gov.sg/secret-source: "external-provisioning-required"
type: Opaque
stringData:
  FLIGHT_API_KEY:         "REPLACE_WITH_REAL_KEY"
  FLIGHT_API_BASE_URL:    "REPLACE_WITH_REAL_URL"
  REDIS_PASSWORD:         "REPLACE_WITH_STRONG_PASSWORD"
  CORS_ALLOWED_ORIGINS:   "REPLACE_WITH_FRONTEND_ORIGIN"
