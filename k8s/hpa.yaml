apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flightplan-backend-hpa
  namespace: flightplan
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flightplan-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flightplan-frontend-hpa
  namespace: flightplan
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flightplan-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
