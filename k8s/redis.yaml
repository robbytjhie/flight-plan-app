# IM8 S4: Redis for distributed leader election (FlightDataCache).
# In production use a managed Redis service (e.g. AWS ElastiCache) instead.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flightplan-redis
  namespace: flightplan
  labels:
    app: flightplan-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flightplan-redis
  template:
    metadata:
      labels:
        app: flightplan-redis
    spec:
      automountServiceAccountToken: false
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flightplan-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - mountPath: /data
              name: redis-data
            - mountPath: /tmp
              name: redis-tmp
      volumes:
        - name: redis-data
          emptyDir: {}   # replace with PersistentVolumeClaim in production
        - name: redis-tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: flightplan
spec:
  selector:
    app: flightplan-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
# IM8 S7: Redis only accepts traffic from the backend pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-netpol
  namespace: flightplan
spec:
  podSelector:
    matchLabels:
      app: flightplan-redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: flightplan-backend
      ports:
        - port: 6379
  egress: []   # Redis makes no outbound connections
