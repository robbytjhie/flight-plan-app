# ══════════════════════════════════════════════════════════════════════════════
# DEV PROFILE  —  mock data, Redis optional
#
# Activate:  mvn spring-boot:run -Dspring-boot.run.profiles=dev
#            (also the default — SPRING_PROFILES_ACTIVE defaults to dev)
#
# What this profile does:
#   ✅  Serves mock flight data — no calls to api.swimapisg.info
#   ✅  Redis OPTIONAL — probed at startup, graceful fallback if not running:
#         Redis running   →  RedisLockRegistry  (prod-like, good for debugging)
#         Redis not running → DefaultLockRegistry (in-memory, zero config needed)
#   ✅  Swagger UI enabled
#   ✅  DEBUG logging
#
# To test Redis behaviour locally (recommended when investigating prod issues):
#   docker run -d -p 6379:6379 --name redis redis:alpine
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
#   → look for: [LEADER] dev — Redis reachable, using RedisLockRegistry
#
# To run without Redis (quick offline dev):
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev   (just don't start Redis)
#   → look for: [LEADER] dev — Redis not reachable ... Falling back to in-memory
# ══════════════════════════════════════════════════════════════════════════════
# IM8 S5: override FLIGHT_API_KEY via env var for real API calls
# FLIGHT_API_INSECURE_SSL=true — if upstream TLS cert is bad/expired (curl -k equivalent)
flight:
  api:
    base-url: ${FLIGHT_API_BASE_URL:https://api.swimapisg.info}
    key: ${FLIGHT_API_KEY:dev-placeholder-key}
    insecure-ssl: ${FLIGHT_API_INSECURE_SSL:false}

# ── Redis connection (optional in dev) ───────────────────────────────────────
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# ── Leader lock TTL ───────────────────────────────────────────────────────────
leader:
  lock:
    ttl-ms: 50000

# ── Verbose logging for development ──────────────────────────────────────────
logging:
  level:
    com.flightplan: DEBUG
    org.springframework.web: INFO
openapi:
  server-url: http://ad6a7f8148e0242e49470e80ed70de4c-e4d39a60fec22e86.elb.ap-southeast-1.amazonaws.com
  server-description: Staging